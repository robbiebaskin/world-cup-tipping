name: refresh-and-deploy

# Rebuilds web/data.json from live results and publishes web/ to GitHub Pages.
# The scorer is stdlib-only and reads committed data/reference/*.json + the
# public ESPN feed, so CI does the whole refresh — no local machine required.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min (GitHub's minimum is 5; timing is best-effort)
  push:
    branches: [main]
  workflow_dispatch: {}

# Let the job publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer run supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build web/data.json from live results
        run: python3 -m wc_scorer export --refresh

      - uses: actions/configure-pages@v5
        with:
          enablement: true   # let the workflow turn on Pages (Actions source) itself

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deploy
        uses: actions/deploy-pages@v4
